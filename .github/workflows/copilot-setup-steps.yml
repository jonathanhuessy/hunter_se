name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install can-utils (for CAN bus tooling)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq can-utils iproute2

      - name: Set up virtual CAN interface for testing
        run: |
          sudo modprobe vcan || true
          sudo ip link add dev vcan0 type vcan || true
          sudo ip link set up vcan0 || true
          ip link show vcan0

      - name: Verify Python imports
        run: python -c "import can; print('python-can', can.__version__)"
